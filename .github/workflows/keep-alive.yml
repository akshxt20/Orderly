name: keep-backend-awake

# Pings the Render backend so the free instance never idles into sleep.
# Runs every 5 minutes (well under Render's ~15-minute sleep window).

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {} # also lets you trigger it manually from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          curl -sS --fail --max-time 90 --retry 4 --retry-delay 15 \
            https://orderly-api-dcga.onrender.com/health
